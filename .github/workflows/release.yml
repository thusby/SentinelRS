name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Binary
        run: cargo build --release
      - name: Create App Bundle
              run:
                chmod +x build_app.sh
                ./build_app.sh
                # Vi må gå dit scriptet la appen for å pakke den riktig
                cd target/release
                zip -r ../../SentinelRS-macOS.zip SentinelRS.app

      - name: Create Release and Upload Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "SentinelRS $TAG" \
            --generate-notes \
            SentinelRS-macOS.zip
