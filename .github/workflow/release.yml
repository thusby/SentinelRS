name: Release
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Release
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p release
          cp target/release/sentinel-rs release/
          zip -r sentinel-rs-macos.zip release/
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: sentinel-rs-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
